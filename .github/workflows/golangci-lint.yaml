name: golangci-lint
on:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: read
env:
  GO_VERSION: stable
  GOLANGCI_LINT_VERSION: v2.12
jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
